name: The Lundquist Letter — Daily Briefing

on:
  schedule:
    # 8:00 AM Central Time = 13:00 UTC (CDT, UTC-5)
    # Adjust to 14:00 UTC during CST (UTC-6), Nov–Mar
    - cron: '0 13 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send The Lundquist Letter
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS_JSON:  ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: python send_briefing.py
